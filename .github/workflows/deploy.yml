name: Deploy Cloud Native Solution

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: Semana3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./Semana3
          file: ./Semana3/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/api-gestion-pedidos:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Conexión directa por SSH usando tu IP actual
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 54.166.215.24
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            sudo docker stop api-gestion-pedidos || true
            sudo docker rm -f api-gestion-pedidos || true
            sudo docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/api-gestion-pedidos:latest || true
            
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/api-gestion-pedidos:latest
            
            sudo docker run -d -p 8080:8080 \
              -e SERVER_PORT=8080 \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
              -e AWS_REGION="${{ secrets.AWS_REGION }}" \
              -e AWS_S3_BUCKET_NAME="guias-despacho-cloudnative-solucion" \
              --name api-gestion-pedidos "${{ secrets.DOCKERHUB_USERNAME }}"/api-gestion-pedidos:latest
            
            sleep 8
            echo "=== ¿EL CONTENEDOR SIGUE VIVO? ==="
            sudo docker ps -a
            echo "=== LOGS REALES DE SPRING BOOT ==="
            sudo docker logs api-gestion-pedidos

      # Configuración de Node y Newman
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman

      # Ejecutar las pruebas con jq para asegurar que la IP se actualice correctamente
      - name: Run Postman Tests
        run: |
          # 1. Instalar jq para manipular JSON de forma segura
          sudo apt-get install -y jq
          
          # 2. Reemplazar la IP en el campo host y en el campo raw de la URL
          jq '.item[0].request.url.host = ["54", "166", "215", "24"] | .item[0].request.url.raw = "http://54.166.215.24:8080"' Semana3/coleccion.json > temp.json && mv temp.json Semana3/coleccion.json
          
          # 3. Mostrar el resultado para verificar en los logs
          echo "=== JSON FINAL (IP ACTUALIZADA) ==="
          cat Semana3/coleccion.json
          
          # 4. Correr las pruebas
          newman run Semana3/coleccion.json